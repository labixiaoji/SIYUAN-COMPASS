name: siyuan-compass-dev

services:
  postgres:
    image: postgres:16-alpine
    pull_policy: never
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siyuan_compass}
      POSTGRES_USER: ${POSTGRES_USER:-siyuan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U ${POSTGRES_USER:-siyuan} -d ${POSTGRES_DB:-siyuan_compass}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: siyuan-compass-backend-dev:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    platform: linux/amd64
    working_dir: /app/backend
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-siyuan}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-siyuan_compass}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173}
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend/app:/app/backend/app
      - ./backend/tests:/app/backend/tests
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    pull_policy: never
    working_dir: /app
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres-dev-data:
  frontend-node-modules:
